<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matsuri Lottery</title>
    <link rel="stylesheet" href="styles.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Settings Sidebar -->
        <aside class="sidebar glass-panel settings-panel collapsed" id="settings-panel">
            <div class="settings-header">
                <h2 class="settings-title">⚙️ 設定</h2>
                <button id="btn-close-settings" class="btn-icon" title="設定を閉じる">×</button>
            </div>
            
            <div class="settings-content" id="settings-content">
            
            <div class="input-group">
                <label for="app-title-input">タイトル表示</label>
                <input type="text" id="app-title-input" value=" ">
            </div>

            <div class="input-group">
                <label for="theme-color-input">テーマカラー</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <input type="color" id="theme-color-input" value="#8b5cf6" style="width: 50px; height: 40px; border: none; border-radius: 0.5rem; background: transparent; cursor: pointer;">
                    <span style="font-size: 0.8rem; color: var(--text-secondary);">色を選択して全体の色味を変更</span>
                </div>
            </div>

            <div class="input-group">
                <label for="total-participants">参加人数</label>
                <div class="exclude-controls">
                    <input type="number" id="total-participants" min="1" value="100">
                    <button id="btn-update-participants" class="btn secondary">更新</button>
                </div>
            </div>

            <div class="input-group">
                <label for="exclude-number">途中退出者 (除外番号)</label>
                <div class="exclude-controls">
                    <input type="text" id="exclude-number" placeholder="例: 1, 2, 5-10">
                    <button id="btn-add-exclude" class="btn secondary">追加</button>
                </div>
                <div id="excluded-list" class="tag-list"></div>
            </div>

            <div class="input-group">
                <label>表示設定</label>
                <button id="btn-fullscreen" class="btn secondary">フルスクリーン表示の切り替え</button>
            </div>

            <div class="danger-zone" style="display: flex; gap: 1rem;">
                <button id="btn-export" class="btn secondary" style="flex: 1;">証跡を出力 (txt)</button>
                <button id="btn-reset" class="btn danger" style="flex: 1;">全てリセット</button>
            </div>
            
            <div class="stats-box">
                <p>残り候補: <span id="stat-remaining" class="highlight-text">0</span> 人</p>
            </div>
            </div>
        </aside>

        <!-- Main Stage -->
        <main class="main-stage">
            <header class="stage-header">
                <h1 id="app-title-display"> </h1>
            </header>
            
            <div class="lottery-arena" id="lottery-arena">
                <!-- Numbers will be injected here -->
                <div class="winner-display hidden" id="winner-display">
                    <div class="winner-label">WINNER</div>
                    <div class="winner-number" id="winner-number">--</div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-start" class="btn primary massive">START</button>
                <button id="btn-stop" class="btn warning massive hidden">STOP</button>
            </div>
        </main>

        <!-- History Sidebar -->
        <aside class="sidebar glass-panel history-panel">
            <div class="history-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h2 style="margin-bottom: 0;">🏆 当選履歴</h2>
                <button id="btn-toggle-settings" class="btn-icon" style="background: transparent; border: none; font-size: 1.5rem; width: auto; height: auto;" title="設定を開く">⚙️</button>
            </div>
            <div class="search-box" style="margin-bottom: 1rem;">
                <input type="number" id="search-history" placeholder="🔍 番号で検索..." style="width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white;">
            </div>
            <div class="history-list-container">
                <ol id="history-list" class="history-list">
                    <!-- History items will be injected here -->
                </ol>
            </div>
        </aside>
    </div>
    
    <script src="app.js?v=2"></script>
</body>
</html>
